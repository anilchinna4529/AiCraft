<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — AICraft</title>
<meta name="description" content="Set a new password for your AICraft account." />
<meta name="theme-color" content="#0a0a0f" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="pages.css" />
</head>
<body>

<nav class="navbar" data-navbar>
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">AI<span class="logo-accent">Craft</span></span>
    </a>
    <button class="hamburger" data-nav-toggle aria-label="Menu"><span></span><span></span><span></span></button>
    <div class="nav-links" data-nav-menu>
      <a href="index.html" class="nav-link">Home</a>
      <a href="ai-tools.html" class="nav-link">Tools</a>
      <a href="pricing.html" class="nav-link">Pricing</a>
    </div>
    <div class="nav-buttons">
      <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">☾</button>
      <a href="login.html" class="btn btn-outline">Sign In</a>
    </div>
  </div>
</nav>

<main class="auth-shell">
  <div class="form-card reveal">
    <div style="text-align: center; margin-bottom: var(--s-5);">
      <div style="font-size: 2.5rem; margin-bottom: var(--s-2);">🔐</div>
      <h1 style="font-size: 1.75rem; letter-spacing: -0.02em; margin-bottom: 8px;">Set a new password</h1>
      <p style="color: var(--text-muted); font-size: 0.9rem;">Choose a strong password you haven't used before.</p>
    </div>

    <form id="resetForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="newPassword">New password</label>
        <input type="password" id="newPassword" class="form-input" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters" />
        <div class="strength-meter" id="strengthMeter" hidden>
          <div class="strength-bar"><span id="strengthFill"></span></div>
          <p class="strength-label" id="strengthLabel">Weak</p>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" class="form-input" required autocomplete="new-password" placeholder="Repeat your new password" />
      </div>

      <div id="resetErr" class="form-msg error" hidden></div>
      <div id="resetOk" class="form-msg success" hidden></div>

      <button type="submit" class="btn btn-primary" id="resetSubmit" style="width: 100%; margin-top: var(--s-3);">Update Password</button>
    </form>

    <div style="text-align: center; margin-top: var(--s-5); font-size: 0.875rem;">
      <a href="login.html" style="color: var(--text-muted);">← Back to sign in</a>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-brand">
      <a href="index.html" class="nav-logo"><span class="logo-icon">✦</span><span class="logo-text">AI<span class="logo-accent">Craft</span></span></a>
      <p class="footer-tagline">The premium directory for AI tools.</p>
    </div>
  </div>
  <div class="footer-bottom"><p>© <span data-year>2025</span> AICraft. Crafted with care.</p></div>
</footer>

<script src="site.js" defer></script>
<script type="module">
  import { getSupabaseClient } from './auth.js';

  const form = document.getElementById('resetForm');
  const pw = document.getElementById('newPassword');
  const cpw = document.getElementById('confirmPassword');
  const errBox = document.getElementById('resetErr');
  const okBox = document.getElementById('resetOk');
  const submitBtn = document.getElementById('resetSubmit');
  const meter = document.getElementById('strengthMeter');
  const fill = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');

  // Supabase puts the recovery token in the URL after the user clicks the email link.
  // It can arrive as:
  //   1. Hash:  #access_token=…&type=recovery           (implicit flow, older projects)
  //   2. Query: ?code=…                                 (PKCE flow, newer projects)
  //   3. Hash:  #error=…&error_description=…            (expired / already used)
  // We initialise the client first (which auto-detects either form), then verify a
  // session actually exists before letting the user submit the form.
  const supabase = await getSupabaseClient();

  const hash = new URLSearchParams(location.hash.slice(1));
  const qs   = new URLSearchParams(location.search);

  // 1. Explicit error from Supabase (expired / already-used link).
  const hashErr = hash.get('error_description') || hash.get('error');
  if (hashErr) {
    submitBtn.disabled = true;
    errBox.innerHTML =
      '❌ ' + hashErr.replace(/\+/g, ' ') +
      '<br><br><a href="login.html" style="color: var(--primary);">Request a new reset link →</a>';
    errBox.hidden = false;
  } else {
    // 2. Wait up to ~3s for Supabase to exchange the URL token for a session.
    //    detectSessionInUrl runs asynchronously on first load.
    let recovered = false;
    for (let i = 0; i < 15; i++) {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) { recovered = true; break; }
      // Fallback: if there's a ?code= param and the client didn't pick it up,
      // call exchangeCodeForSession explicitly (needed in some SDK versions).
      const code = qs.get('code');
      if (code) {
        try {
          const { data } = await supabase.auth.exchangeCodeForSession(code);
          if (data?.session) { recovered = true; break; }
        } catch (_) { /* fall through to retry */ }
      }
      await new Promise((r) => setTimeout(r, 200));
    }
    if (!recovered) {
      submitBtn.disabled = true;
      errBox.innerHTML =
        '❌ This reset link is invalid or has expired.' +
        '<br><br><a href="login.html" style="color: var(--primary);">Request a new reset link →</a>';
      errBox.hidden = false;
    }
  }

  // Strength meter
  function scorePw(v) {
    let s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/\d/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    return s;
  }
  pw.addEventListener('input', () => {
    const v = pw.value;
    if (!v) { meter.hidden = true; return; }
    meter.hidden = false;
    const s = scorePw(v);
    const pct = (s / 4) * 100;
    fill.style.width = pct + '%';
    const levels = ['Very weak', 'Weak', 'Fair', 'Good', 'Strong'];
    const colors = ['var(--danger)', 'var(--danger)', 'var(--warning)', 'var(--success)', 'var(--success)'];
    label.textContent = levels[s];
    fill.style.background = colors[s];
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBox.hidden = true; okBox.hidden = true;
    if (pw.value.length < 8) {
      errBox.textContent = '❌ Password must be at least 8 characters.';
      errBox.hidden = false; return;
    }
    if (pw.value !== cpw.value) {
      errBox.textContent = '❌ Passwords do not match.';
      errBox.hidden = false; return;
    }
    submitBtn.disabled = true; submitBtn.textContent = 'Updating…';
    try {
      // Double-check a session is still present (recovery sessions are short-lived).
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        throw new Error('Your reset link has expired. Please request a new one.');
      }
      const { error } = await supabase.auth.updateUser({ password: pw.value });
      if (error) throw error;
      okBox.textContent = '✓ Password updated! Redirecting…';
      okBox.hidden = false;
      window.AICraft?.toast?.('Password updated', 'success');
      // Sign the user out of the recovery session so they log in fresh with the new password.
      try { await supabase.auth.signOut(); } catch (_) {}
      setTimeout(() => location.href = 'login.html?reset=1', 1500);
    } catch (err) {
      console.error('Reset password failed:', err);
      submitBtn.disabled = false; submitBtn.textContent = 'Update Password';
      const raw = (err.message || '').toLowerCase();
      let msg = err.message || 'Could not update password. Try the reset link again.';
      if (raw.includes('auth session missing') || raw.includes('session') && raw.includes('missing')) {
        msg = 'Your reset link has expired or was already used. Please request a new one.';
      } else if (raw.includes('same as the old') || raw.includes('should be different')) {
        msg = 'Your new password must be different from the current one.';
      } else if (raw.includes('password should be') || raw.includes('weak')) {
        msg = 'Password is too weak. Use at least 8 characters with letters, numbers and symbols.';
      } else if (raw.includes('rate limit') || raw.includes('too many')) {
        msg = 'Too many attempts. Please wait a few minutes and try again.';
      }
      errBox.innerHTML = '❌ ' + msg +
        '<br><br><a href="login.html" style="color: var(--primary);">Request a new reset link →</a>';
      errBox.hidden = false;
    }
  });
</script>
</body>
</html>
