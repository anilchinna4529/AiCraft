<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verify Email — AICraft</title>
<meta name="description" content="Enter the 6-digit code we emailed you to verify your AICraft account." />
<meta name="theme-color" content="#0a0a0f" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="pages.css" />
</head>
<body>

<nav class="navbar" data-navbar>
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">AI<span class="logo-accent">Craft</span></span>
    </a>
    <button class="hamburger" data-nav-toggle aria-label="Menu"><span></span><span></span><span></span></button>
    <div class="nav-links" data-nav-menu>
      <a href="index.html" class="nav-link">Home</a>
      <a href="ai-tools.html" class="nav-link">Tools</a>
      <a href="sectors.html" class="nav-link">Sectors</a>
      <a href="pricing.html" class="nav-link">Pricing</a>
    </div>
    <div class="nav-buttons">
      <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">☾</button>
      <a href="login.html" class="btn btn-outline">Sign In</a>
    </div>
  </div>
</nav>

<main class="auth-shell">
  <div class="form-card reveal">
    <div style="text-align: center; margin-bottom: var(--s-5);">
      <div style="font-size: 2.5rem; margin-bottom: var(--s-2);">✉️</div>
      <h1 style="font-size: 1.75rem; letter-spacing: -0.02em; margin-bottom: 8px;">Verify your email</h1>
      <p id="emailDisplay" style="color: var(--text-muted); font-size: 0.9rem;">Check your inbox for the 6-digit code.</p>
    </div>

    <form id="verifyForm" novalidate>
      <div class="otp-group">
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" autocomplete="one-time-code" />
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" />
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" />
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" />
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" />
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" />
      </div>

      <div id="verifyErr" class="form-msg error" hidden></div>

      <button type="submit" class="btn btn-primary" id="verifySubmit" style="width: 100%; margin-top: var(--s-4);">Verify Email</button>
    </form>

    <div style="text-align: center; margin-top: var(--s-5); color: var(--text-muted); font-size: 0.875rem;">
      Didn't receive the code?
      <button type="button" id="resendBtn" style="background: none; border: none; color: var(--primary); font-weight: 600; cursor: pointer; padding: 0;">Resend</button>
      <span id="resendTimer" style="display: none;"></span>
    </div>

    <div style="text-align: center; margin-top: var(--s-3); font-size: 0.85rem;">
      <a href="signup.html" style="color: var(--text-muted);">← Use a different email</a>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-brand">
      <a href="index.html" class="nav-logo"><span class="logo-icon">✦</span><span class="logo-text">AI<span class="logo-accent">Craft</span></span></a>
      <p class="footer-tagline">The premium directory for AI tools.</p>
    </div>
    <div class="footer-links">
      <div><h4>Support</h4><a href="support.html">Help</a><a href="contact.html">Contact</a></div>
    </div>
  </div>
  <div class="footer-bottom"><p>© <span data-year>2025</span> AICraft. Crafted with care.</p></div>
</footer>

<script src="site.js" defer></script>
<script type="module">
  import { verifyOTP, resendOTP, maskEmail } from './auth.js';

  const form = document.getElementById('verifyForm');
  const digits = document.querySelectorAll('.otp-digit');
  const errBox = document.getElementById('verifyErr');
  const emailDisplay = document.getElementById('emailDisplay');
  const resendBtn = document.getElementById('resendBtn');
  const resendTimer = document.getElementById('resendTimer');
  const submitBtn = document.getElementById('verifySubmit');

  const pendingEmail = sessionStorage.getItem('pending_email');
  if (!pendingEmail) {
    // Allow entry by URL param: verify.html?email=you@example.com
    const p = new URLSearchParams(location.search).get('email');
    if (p) {
      sessionStorage.setItem('pending_email', p);
      emailDisplay.textContent = `Check ${maskEmail(p)} for the code`;
    } else {
      location.href = 'signup.html';
    }
  } else {
    emailDisplay.textContent = `Check ${maskEmail(pendingEmail)} for the code`;
  }

  // OTP digit behavior
  digits.forEach((digit, i) => {
    digit.addEventListener('input', (e) => {
      const v = e.target.value;
      if (!/^\d?$/.test(v)) { e.target.value = ''; return; }
      if (v && i < digits.length - 1) digits[i + 1].focus();
      updateStyles();
      // Auto-submit when all 6 digits are present.
      const joined = Array.from(digits).map(d => d.value).join('');
      if (joined.length === 6 && !submitBtn.disabled) {
        form.dispatchEvent(new Event('submit'));
      }
    });
    digit.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && i > 0) digits[i - 1].focus();
      if (e.key === 'ArrowLeft' && i > 0) digits[i - 1].focus();
      if (e.key === 'ArrowRight' && i < digits.length - 1) digits[i + 1].focus();
    });
    digit.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
      pasted.split('').forEach((c, idx) => { if (digits[idx]) digits[idx].value = c; });
      updateStyles();
      if (pasted.length === 6) form.dispatchEvent(new Event('submit'));
    });
  });
  function updateStyles() { digits.forEach(d => d.classList.toggle('filled', d.value !== '')); }

  // Resend cooldown
  let cooldown = 0;
  resendBtn.addEventListener('click', async () => {
    if (cooldown > 0) return;
    const email = sessionStorage.getItem('pending_email');
    if (!email) return;
    try {
      resendBtn.disabled = true;
      await resendOTP(email);
      window.AICraft?.toast?.('Code sent. Check your inbox.', 'success');
      cooldown = 60;
      resendBtn.style.display = 'none';
      resendTimer.style.display = 'inline';
      const iv = setInterval(() => {
        cooldown--;
        resendTimer.textContent = ` Resend in ${cooldown}s`;
        if (cooldown <= 0) {
          clearInterval(iv);
          resendBtn.style.display = 'inline';
          resendTimer.style.display = 'none';
          resendBtn.disabled = false;
        }
      }, 1000);
    } catch (err) {
      console.error('Resend OTP failed:', err);
      resendBtn.disabled = false;
      const raw = (err.message || '').toLowerCase();
      let msg = err.message || 'Could not resend code.';
      if (raw.includes('rate limit') || raw.includes('too many') || raw.includes('for security')) {
        msg = 'Please wait a minute before requesting another code.';
      } else if (raw.includes('already confirmed') || raw.includes('already verified')) {
        msg = 'This email is already verified. You can sign in now.';
      } else if (raw.includes('user not found') || raw.includes('no user')) {
        msg = 'No pending signup for that email. Please sign up first.';
      }
      errBox.textContent = '❌ ' + msg;
      errBox.hidden = false;
    }
  });

  // Submit
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBox.hidden = true;
    const otp = Array.from(digits).map(d => d.value).join('');
    if (otp.length !== 6) {
      errBox.textContent = '❌ Please enter all 6 digits.';
      errBox.hidden = false;
      return;
    }
    const email = sessionStorage.getItem('pending_email');
    submitBtn.disabled = true; submitBtn.textContent = 'Verifying…';
    try {
      await verifyOTP(email, otp);
      sessionStorage.removeItem('pending_email');
      window.AICraft?.toast?.('Email verified!', 'success');
      setTimeout(() => location.href = 'login.html?verified=1', 500);
    } catch (err) {
      console.error('OTP verification failed:', err);
      submitBtn.disabled = false; submitBtn.textContent = 'Verify Email';
      const raw = (err.message || '').toLowerCase();
      let msg = err.message || 'Invalid code. Please try again.';
      if (raw.includes('token has expired') || raw.includes('otp expired') || raw.includes('expired')) {
        msg = 'This code has expired. Click "Resend" to get a new one.';
      } else if (raw.includes('invalid') && (raw.includes('token') || raw.includes('otp') || raw.includes('code'))) {
        msg = 'Incorrect code. Double-check the 6 digits in your email and try again.';
      } else if (raw.includes('rate limit') || raw.includes('too many')) {
        msg = 'Too many attempts. Please wait a minute before trying again.';
      } else if (raw.includes('user already') || raw.includes('already confirmed') || raw.includes('already verified')) {
        msg = 'This email is already verified. You can sign in now.';
        setTimeout(() => location.href = 'login.html?verified=1', 1500);
      }
      errBox.textContent = '❌ ' + msg;
      errBox.hidden = false;
      digits.forEach(d => d.value = '');
      updateStyles();
      digits[0].focus();
    }
  });

  // Focus first
  if (digits[0]) digits[0].focus();
</script>
</body>
</html>
